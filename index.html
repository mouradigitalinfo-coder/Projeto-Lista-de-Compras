<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/styles/index.css">
    <title>Organize&Compre</title>
</head>
<body>
    <div id="app">
      <!-- Splash Screen Container -->
    
      <div id="splash-screen" class="splash-container">
        
        <div class="content-wrapper">
          <!-- Logo Section -->
            <div id="forma" class="forma-card-hidden">
                <div id="forma-icon" class="forma-simples">
                    <img src="/src/assets/icons/forma-icon.svg" alt="Forma Simples"/>
                </div>
            </div>

          <div class="logo-area">
            <div id="logo-v1" class="logo-simple-hidden">
              <img src="/src/assets/icons/carrinho de compras branco.svg" alt="Logo"/>
            </div>
            
            <div id="logo-v2" class="logo-card-hidden">
              <div class="card-v2">
                <img src="/src/assets/icons/logo carrinho 2.svg" alt="Logo-2"/>
              </div>
            </div>
          </div>

          <!-- Text Section -->
          <div id="text-section" class="text-area-hidden">
            <h1 class="main-title">Organize & Compre</h1>
            <div class="divider"></div>
            
            <div class="welcome-msg">
              <h2 class="welcome-title">Bem-vindo</h2>
              <p class="welcome-subtitle">AO APP DE LISTA DE COMPRAS MAIS PRÁTICO DO MUNDO!</p>
            </div>

            <button id="start-btn" class="btn-primary">
              Começar
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
          </div>
        </div>
        <div id="marca-dagua" class="bg-marca">ORG</div>
      </div>
    </div>

  <script src="/src/script/main.js"></script>
</body>
</html>
