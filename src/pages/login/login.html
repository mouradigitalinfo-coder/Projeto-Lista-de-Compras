<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/pages/login/login.css">
    
    <title>Organize&Compre</title>
</head>
<body>
    <header class="header-login">
        <img src="/src/assets/icons/logo carrinho 3.svg" alt="Logo" class="logo-cart">
        <h2 class="title-logo">Organize & Compre</h2>
    </header>
    <main>
        <form class="section-text">
            <h1 class="title">Bem-vindo</h1>
            <p class="text-subtitle">Sua lista de compras inteligente começa
            aqui.</p>
            <label class="label" for="text">NOME</label>
            <input type="text" id = "text-nome" class="input" placeholder="Seu nome completo aqui..." required>

            <label class="label" for="email">EMAIL</label>
            <input type="email" id = "text-email" class="input" placeholder="seu@email.com" required>

            <button type="submit" class="btn-login">Entrar</button>
        </form>
        <section class="signup-section">
            <p class="conect-text">ou conecte-se com</p>
            <div class="social-conect">
                <div class="conta">
                    <img src="/src/assets/icons/google-logo.svg" alt="Google Logo" class="logo">
                    <a href="#" class="signup-link">Google</a>
                </div>
                <div class="conta">
                    <img src="/src/assets/icons/facebook-logo.svg" alt="Facebook Logo" class="logo">
                    <a href="#" class="signup-link">Facebook</a>
                </div>
            </div>
            <div class="cadastre-section">
                <p class="text-cadastre">Novo por aqui?</p>
                <a href="#" class="cadastre">Cadastre-se</a>
            </div>
        </section>
    </main>
    
</body>
</html>
